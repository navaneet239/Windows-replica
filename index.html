<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Replicas</title>
    <style>
        *{box-sizing: border-box;}
        body,html {
            background-image: url("https://uploads-ssl.webflow.com/6384db3d7b4dd356473d0489/6388a95c066e0ed4a8e4a148_wallpaperbetter.com_1920x1080%20(5)-p-1600.jpg");
            background-size: cover;
            background-position: 0%;
            transition: all 0.9s ; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 15px; color: white;
        }

        
    /* scrollbar */
    ::-webkit-scrollbar {
        width: 5px;
    }
  
  /* Track */
  ::-webkit-scrollbar-track {
    border-radius: 5px;
    background: transparent;
  }
  
  /* Handle */
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(255, 140, 0, 0.55) 0%, rgba(133, 53, 0, 0.55) 100%);
    border-radius: 2px;
    -webkit-transition: all 0.3s;
    transition: all 0.3s;
  }
  
  /* Handle on hover */
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(255, 140, 0, 0.75) 0%, rgba(133, 53, 0, 0.75) 100%);
    border-radius: 50px;
  }

        header {
            padding-left: 10px; padding-right: 10px;
        }
        header h1{padding: 10px;}
        a {font-size: 21px; text-decoration: none;  color: white; transition: all 0.3s;}
        header a:hover{text-decoration: underline;}

        main {position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            align-items: center; text-align: center; padding: 10px;
            border: 2px solid rgba(209, 209, 209, 0.20);
            background-color: rgba(214, 214, 214, 0.15);
            backdrop-filter: blur(25px); overflow-x: hidden; overflow-y: scroll;
            border-radius: 8px; height: 87.5%; width: 98%;
        }

        button{
            border: 2px solid rgba(209, 209, 209, 0.20);
            background-color: rgba(214, 214, 214, 0.15);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold; margin: 5px; height: 100px;
            transition: all 0.5s; width: 15vw;
        }
        .footer{
            position: absolute; width: inherit; left: 50%; bottom: 0;  transform: translateX(-50%);
        }
        .footer #afflt {float: right;  text-align: right;}

        .note{background-color: rgba(255, 221, 0, 0.267); width: max-content; padding: 10px; border-radius: 5px; transition: all 0.3s;border: 2px solid rgba(209, 209, 209, 0.20);}
        .note span{margin-left: 10px; background-color: orange; padding: 5px; border-radius: 2.5px; margin-left: -5px; margin-right: 10px; font-weight: bolder;} 
        
        @media (max-width: 850px){
            #side-links{display: none}
            header h1{text-align: center;}
            main{width: 97%;}
            button{width: 100%;}
            .footer{position: relative;}
            .note{width: 98%;}
        }
    </style>
</head>
<body>
    <header>
        <h1>Windows Replicas</h1>
        <div style="position:absolute; right: 25px; top: 25px" id="side-links">
            <a href="https://github.com/navaneet239/Windows-replica" style="margin-left: 15px;">Repository</a>
        </div>
    </header>
    <main>
        <h1>Choose your Destination</h1>
        <div>
            <center><p class="note"><span>!</span>Click on the text inside if the button doesnt work</p></center>
            <button><a href="win95.html">Windows 95</a></button>
            <button><a href="winXp.html">Windows XP</a></button>
            <button><a href="win7.html">Windows 7</a></button>
            <button><a href="win10.html">Windows 10</a></button>
            <button><a href="win11.html">Windows 11</a></button>
            <button><a href="dialogs.html">Windows dialog Box</a></button>
        </div>

        <div class="footer">
            <p >Copyright (c) 2023 Navaneet Jaggannathan</p>
            <p>This project isn't in any way affliated with microsoft and all the products are the trademarks of it.* </p>
        </div>
    </main>
</body>
</html>
